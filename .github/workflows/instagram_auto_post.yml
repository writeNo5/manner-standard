name: Instagram Auto Poster Bot

on:
  schedule:
    # 사용자 피드백 반영: 한국 시간(KST) 오전 7시, 오후 4시 발사
    # KST 오전 7시 = UTC 오후 10시 (22:00)
    # KST 오후 4시 = UTC 오전 7시 (07:00)
    - cron: '0 22,7 * * *'
    
  workflow_dispatch: # 에러가 나거나 즉시 수동 발사를 테스트하고 싶을 때 GitHub에서 강제 실행 가능

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃 (Checkout Repository)
        uses: actions/checkout@v3

      - name: Node.js 20버전 환경 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 인스타 오토봇 실행 (Run Bot)
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          node scripts/instagram_bot.js

      - name: 완료된 로그 저장 (Commit and Push State)
        run: |
          git config --local user.email "bot@manner-standard.com"
          git config --local user.name "Quentin Auto Bot"
          # posted_state.json 파일이 변경되었다면 깃허브에 커밋하여 업로드 현황 1바퀴 리셋 로직을 연동합니다.
          git add scripts/posted_state.json
          git commit -m "chore(bot): Update posted state log [skip ci]" || echo "No changes to commit"
          git push
